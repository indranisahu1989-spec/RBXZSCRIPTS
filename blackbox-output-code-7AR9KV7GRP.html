<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Hub - Upload & Share</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #0c0c2e, #1a0d3a, #2a1b5a, #0f0f3a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: #e0e0ff;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 20px 0;
            text-align: center;
            background: rgba(12, 12, 46, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b8b8ff;
            font-weight: 400;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Upload Section */
        .upload-section {
            background: rgba(20, 20, 60, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.2);
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #d0d0ff;
            font-size: 1.1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: rgba(40, 40, 80, 0.8);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: #e0e0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: scale(1.02);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Courier New', monospace;
        }

        .upload-btn {
            grid-column: span 2;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        /* Scripts Grid */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .script-card {
            background: rgba(20, 20, 60, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .script-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transition: left 0.5s;
        }

        .script-card:hover::before {
            left: 100%;
        }

        .script-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(102, 126, 234, 0.2);
        }

        .script-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        .script-author {
            color: #b8b8ff;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .script-code {
            background: rgba(10, 10, 30, 0.9);
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #8888cc;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .upload-form {
                grid-template-columns: 1fr;
            }
            
            .upload-btn {
                grid-column: span 1;
            }
            
            .logo {
                font-size: 2rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 60, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Animated Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <h1 class="logo">
            <i class="fas fa-gamepad"></i> Roblox Script Hub
        </h1>
        <p class="subtitle">Upload, Share & Discover Epic Scripts</p>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Upload Section -->
        <section class="upload-section">
            <h2 class="section-title">Upload New Script</h2>
            <form class="upload-form" id="uploadForm">
                <div class="form-group">
                    <label for="scriptTitle"><i class="fas fa-heading"></i> Script Title</label>
                    <input type="text" id="scriptTitle" required>
                </div>
                <div class="form-group">
                    <label for="scriptAuthor"><i class="fas fa-user"></i> Your Username</label>
                    <input type="text" id="scriptAuthor" required>
                </div>
                <div class="form-group">
                    <label for="gameType"><i class="fas fa-gamepad"></i> Game Type</label>
                    <select id="gameType" required>
                        <option value="">Select Game Type</option>
                        <option value="obby">Obby</option>
                        <option value="tycoon">Tycoon</option>
                        <option value="simulator">Simulator</option>
                        <option value="rpg">RPG</option>
                        <option value="fps">FPS</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="scriptCode"><i class="fas fa-code"></i> Script Code</label>
                    <textarea id="scriptCode" placeholder="-- Paste your Roblox script here&#10;&#10;local Players = game:GetService(&quot;Players&quot;)&#10;local player = Players.LocalPlayer&#10;print(&quot;Script loaded!&quot;)" required></textarea>
                </div>
                <button type="submit" class="upload-btn">
                    <i class="fas fa-upload"></i> Upload Script
                </button>
            </form>
        </section>

        <!-- Scripts Grid -->
        <section>
            <h2 class="section-title">Latest Scripts</h2>
            <div class="scripts-grid" id="scriptsGrid">
                <!-- Scripts will be populated by JavaScript -->
            </div>
        </section>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Sample scripts data
        const sampleScripts = [
            {
                title: "Speed Hack V2",
                author: "ProGamerX",
                gameType: "obby",
                code: `local Players = game:GetService("Players")\nlocal player = Players.LocalPlayer\nlocal character = player.Character or player.CharacterAdded:Wait()\n\nwhile true do\n    character.Humanoid.WalkSpeed = 100\n    wait(0.1)\nend`,
                downloads: 1247,
                date: "2 hours ago"
            },
            {
                title: "Infinite Jump",
                author: "ScriptMaster",
                gameType: "simulator",
                code: `local Players = game:GetService("Players")\nlocal UserInputService = game:GetService("UserInputService")\nlocal player = Players.LocalPlayer\n\nUserInputService.JumpRequest:Connect(function()\n    if player.Character then\n        player.Character.Humanoid:ChangeState(Enum.HumanoidStateType.Jumping)\n    end\nend)`,
                downloads: 892,
                date: "5 hours ago"
            },
            {
                title: "Auto Farm Pro",
                author: "EliteHaxor",
                gameType: "tycoon",
                code: `local Players = game:GetService("Players")\nlocal player = Players.LocalPlayer\n\nwhile true do\n    for _, obj in pairs(workspace:GetChildren()) do\n        if obj.Name == "FarmObject" then\n            fireclickdetector(obj.ClickDetector)\n        end\n    end\n    wait(0.5)\nend`,
                downloads: 2156,
                date: "1 day ago"
            }
        ];

        // Render scripts
        function renderScripts(scripts = sampleScripts) {
            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = scripts.map(script => `
                <div class="script-card">
                    <h3 class="script-title">${script.title}</h3>
                    <div class="script-author">
                        <i class="fas fa-user"></i> ${script.author} • ${script.gameType}
                    </div>
                    <div class="script-code">${script.code}</div>
                    <div class="script-meta">
                        <div class="stats">
                            <div class="stat">
                                <i class="fas fa-download"></i> ${script.downloads}
                            </div>
                            <div class="stat">
                                <i class="fas fa-clock"></i> ${script.date}
                            </div>
                        </div>
                        <button class="copy-btn" onclick="copyScript(this)">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Copy script to clipboard
        function copyScript(button) {
            const card = button.closest('.script-card');
            const code = card.querySelector('.script-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const icon = button.querySelector('i');
                icon.className = 'fas fa-check';
                setTimeout(() => {
                    icon.className = 'fas fa-copy';
                }, 2000);
            });
        }

        // Handle form submission
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('scriptTitle').value,
                author: document.getElementById('scriptAuthor').value,
                gameType: document.getElementById('gameType').value,
                code: document.getElementById('scriptCode').value
            };

            // Add to scripts array (in real app, send to server)
            sampleScripts.unshift({
                ...formData,
                downloads: 0,
                date: 'Just now'
            });

            // Reset form
            this.reset();
            
            // Re-render scripts
            renderScripts();
            
            // Show success message
            alert('✅ Script uploaded successfully!');
        });

        // Initialize
        createParticles();
        renderScripts();

        // Add typing effect to logo
        const logo = document.querySelector('.logo');
        const originalText = logo.innerHTML;
        let i = 0;
        function typeWriter() {
            if (i < originalText.length) {
                logo.innerHTML = originalText.slice(0, i + 1) + '|';
                i++;
                setTimeout(typeWriter, 100);
            } else {
                logo.innerHTML = originalText;
            }
        }
        setTimeout(typeWriter, 500);
    </script>
</body>
</html>

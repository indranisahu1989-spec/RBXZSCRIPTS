<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX SCRIPT HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(-45deg, #0a0a2e, #1a0d3a, #2a1b5a, #0f0f3a, #1e1a4a);
            background-size: 600% 600%;
            animation: gradientBG 12s ease infinite;
            color: #e8e8ff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #667eea 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            background: rgba(10, 10, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid rgba(102, 126, 234, 0.4);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.6);
            margin-bottom: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #667eea); }
            to { filter: drop-shadow(0 0 20px #764ba2); }
        }

        .tagline {
            font-size: 1.2rem;
            color: #b8c6ff;
            font-weight: 400;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Upload Section */
        .upload-card {
            background: rgba(20, 20, 70, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 50px;
            border: 2px solid rgba(102, 126, 234, 0.4);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .upload-card:hover {
            transform: translateY(-10px);
            border-color: #667eea;
            box-shadow: 0 35px 80px rgba(102, 126, 234, 0.3);
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .upload-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #d4d4ff;
            font-size: 1.1rem;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            z-index: 2;
        }

        input, select, textarea {
            width: 100%;
            padding: 18px 18px 18px 50px;
            background: rgba(35, 35, 85, 0.8);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 15px;
            color: #e8e8ff;
            font-family: 'Exo 2', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(50, 50, 100, 0.9);
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 180px;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
        }

        .upload-btn {
            grid-column: 1 / -1;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
        }

        .upload-btn:active {
            transform: translateY(-2px);
        }

        /* Scripts Grid */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        .script-card {
            background: rgba(20, 20, 70, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .script-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .script-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: #667eea;
            box-shadow: 0 30px 60px rgba(102, 126, 234, 0.4);
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .script-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .script-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #b8c6ff;
        }

        .script-code {
            background: rgba(10, 10, 40, 0.9);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            max-height: 220px;
            overflow-y: auto;
            border-left: 5px solid #667eea;
            margin-bottom: 25px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .script-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-copy {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            flex: 1;
        }

        .btn-copy:hover {
            background: #667eea;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: rgba(255, 68, 68, 0.8);
            color: white;
        }

        .btn-delete:hover {
            background: #ff4444;
        }

        /* Success Message */
        .success-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.4s ease;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .success-msg.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .upload-form {
                grid-template-columns: 1fr;
            }
            .scripts-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px 15px;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 70, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <h1 class="logo">
            <i class="fas fa-robot"></i> ROBLOX SCRIPT HUB
        </h1>
        <p class="tagline">Upload • Share • Execute Epic Scripts</p>
    </header>

    <div class="container">
        <!-- Upload Section -->
        <div class="upload-card">
            <h2 class="section-title">
                <i class="fas fa-cloud-upload-alt"></i> UPLOAD SCRIPT
            </h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Script Name</label>
                    <input type="text" id="scriptName" placeholder="Enter script name..." required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Your Username</label>
                    <input type="text" id="username" placeholder="Your Roblox username..." required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-gamepad"></i> Game Type</label>
                    <select id="gameType" required>
                        <option value="">Choose game type...</option>
                        <option value="obby">🏃 Obby</option>
                        <option value="tycoon">🏭 Tycoon</option>
                        <option value="simulator">⚡ Simulator</option>
                        <option value="rpg">⚔️ RPG</option>
                        <option value="fps">🔫 FPS</option>
                        <option value="other">🎮 Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code"></i> Script Code</label>
                    <textarea id="scriptCode" placeholder="Paste your Roblox Lua script here..." required></textarea>
                </div>
                <button type="submit" class="upload-btn">
                    <i class="fas fa-rocket"></i> 🚀 UPLOAD SCRIPT
                </button>
            </form>
        </div>

        <!-- Scripts List -->
        <div>
            <h2 class="section-title">
                <i class="fas fa-list"></i> LATEST SCRIPTS ( <span id="scriptCount">3</span> )
            </h2>
            <div class="scripts-grid" id="scriptsGrid">
                <!-- Scripts will load here -->
            </div>
        </div>
    </div>

    <!-- Success Message -->
    <div class="success-msg" id="successMsg">
        <i class="fas fa-check-circle"></i> Script uploaded successfully!
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particles.appendChild(particle);
            }
        }

        // Scripts storage
        let scripts = [
            {
                id: 1,
                name: "Speed Hack Pro",
                user: "xProGamer",
                type: "obby",
                code: `local Players = game:GetService("Players")\nlocal player = Players.LocalPlayer\n\nwhile wait() do\n  if player.Character and player.Character:FindFirstChild("Humanoid") then\n    player.Character.Humanoid.WalkSpeed = 100\n  end\nend`,
                downloads: 1247,
                date: "2h ago"
            },
            {
                id: 2,
                name: "Infinite Jump",
                user: "ScriptKing",
                type: "simulator",
                code: `local UserInputService = game:GetService("UserInputService")\nlocal player = game.Players.LocalPlayer\n\nUserInputService.JumpRequest:Connect(function()\n  if player.Character then\n    player.Character.Humanoid:ChangeState("Jumping")\n  end\nend)`,
                downloads: 892,
                date: "5h ago"
            },
            {
                id: 3,
                name: "Auto Farm",
                user: "HaxMaster",
                type: "tycoon",
                code: `while wait(0.1) do\n  for _,v in pairs(workspace:GetChildren()) do\n    if v.Name == "Coin" then\n      fireclickdetector(v.ClickDetector)\n    end\n  end\nend`,
                downloads: 2156,
                date: "1d ago"
            }
        ];

        // Render scripts
        function renderScripts() {
            const grid = document.getElementById('scriptsGrid');
            const count = document.getElementById('scriptCount');
            
            grid.innerHTML = scripts.map(script => `
                <div class="script-card" data-id="${script.id}">
                    <div class="script-header">
                        <div>
